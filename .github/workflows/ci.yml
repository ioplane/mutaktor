name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21, 25]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and test
        run: ./gradlew check --no-daemon --warning-mode=all
      - name: Validate plugins
        run: ./gradlew validatePlugins --no-daemon
      - name: Check for deprecation warnings
        run: |
          OUTPUT=$(./gradlew build --warning-mode=all --no-daemon 2>&1)
          if echo "$OUTPUT" | grep -qi "deprecat"; then
            echo "::warning::Deprecation warnings found"
          fi
      - name: Generate JaCoCo coverage report
        if: matrix.java == 17
        run: ./gradlew jacocoTestReport --no-daemon

      - name: Upload to Codecov
        if: matrix.java == 17
        uses: codecov/codecov-action@v5
        with:
          files: "**/build/reports/jacoco/test/jacocoTestReport.xml"
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: "**/build/reports/tests/"
          retention-days: 14

  # CodeQL security scanning
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build for CodeQL
        run: ./gradlew compileKotlin --no-daemon
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
