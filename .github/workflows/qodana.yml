name: Qodana

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2024.3
        with:
          args: >
            --linter,jetbrains/qodana-jvm-community:latest,
            --project-dir,.
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
