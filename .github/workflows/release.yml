name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # Job 1: Build + test on all JDKs
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21, 25]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build and test
        run: ./gradlew check -Pversion="${VERSION}" --no-daemon

  # Job 2: Build release artifacts
  build-artifacts:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build JARs
        run: ./gradlew build -Pversion="${VERSION}" --no-daemon -x test
      - name: Generate checksums
        run: |
          cd mutaktor-gradle-plugin/build/libs
          sha256sum *.jar > checksums-plugin.sha256
          cd ../../../mutaktor-pitest-filter/build/libs
          sha256sum *.jar > checksums-filter.sha256
          cd ../../../mutaktor-annotations/build/libs
          sha256sum *.jar > checksums-annotations.sha256
      - name: Create test reports archive
        run: |
          tar -czf mutaktor-${VERSION}-reports.tar.gz \
            */build/reports/ 2>/dev/null || true
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            mutaktor-gradle-plugin/build/libs/*.jar
            mutaktor-pitest-filter/build/libs/*.jar
            mutaktor-annotations/build/libs/*.jar
            mutaktor-gradle-plugin/build/libs/*.sha256
            mutaktor-pitest-filter/build/libs/*.sha256
            mutaktor-annotations/build/libs/*.sha256
            mutaktor-*-reports.tar.gz

  # Job 3: Create GitHub Release
  release:
    runs-on: ubuntu-latest
    needs: build-artifacts
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/
      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## / { if (found) exit; if ($0 ~ ver) { found=1; next } }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)" > release-notes.md
          fi
          cat release-notes.md
      - name: Create GitHub Release
        run: |
          find artifacts/ -type f | sort
          gh release create "$GITHUB_REF_NAME" \
            --title "mutaktor ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            $(find artifacts/ -name "*.jar" -o -name "*.sha256" -o -name "*.tar.gz" | tr '\n' ' ')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
