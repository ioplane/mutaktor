name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  verify:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21, 25]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build and test
        run: ./gradlew check -Pversion="${VERSION}" --no-daemon

  build-artifacts:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build JARs
        run: ./gradlew build -Pversion="${VERSION}" --no-daemon -x test
      - name: Generate checksums
        run: |
          cd mutaktor-gradle-plugin/build/libs
          sha256sum *.jar > checksums-plugin.sha256
          cd ../../../mutaktor-pitest-filter/build/libs
          sha256sum *.jar > checksums-filter.sha256
          cd ../../../mutaktor-annotations/build/libs
          sha256sum *.jar > checksums-annotations.sha256
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-artifacts
          path: |
            mutaktor-gradle-plugin/build/libs/*.jar
            mutaktor-pitest-filter/build/libs/*.jar
            mutaktor-annotations/build/libs/*.jar
            mutaktor-gradle-plugin/build/libs/*.sha256
            mutaktor-pitest-filter/build/libs/*.sha256
            mutaktor-annotations/build/libs/*.sha256

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build-artifacts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: artifacts/
      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## / { if (found) exit; if ($0 ~ ver) { found=1; next } }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)" > release-notes.md
          fi
      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "mutaktor ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            $(find ./artifacts/ -name "*.jar" -o -name "*.sha256" | tr '\n' ' ')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
